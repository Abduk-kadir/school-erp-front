name: Deploy School ERP Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            cd /var/www/apps/school-erp-front

            git config --global --add safe.directory /var/www/apps/school-erp-front

            git pull origin main

            npm install

            npm run build